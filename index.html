<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>FantasyCN 活动配置</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,"Microsoft YaHei",sans-serif;background:#101827;color:#fff;padding:24px}
    .card{max-width:900px;margin:auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:22px}
    pre{white-space:pre-wrap;word-break:break-all;background:rgba(0,0,0,.35);padding:16px;border-radius:10px;max-height:600px;overflow:auto}
  </style>
</head>
<body>
  <div class="card">
    <h1>FantasyCN 活动配置</h1>
    <p id="status">正在读取 config.json...</p>
    <pre id="json"></pre>
  </div>
  <script>
    fetch('./config.json?ts=' + Date.now())
      .then(r => r.json())
      .then(j => {
        document.getElementById('status').textContent =
          '配置读取成功：' + (j['配置版本'] || '未填写版本');
        document.getElementById('json').textContent =
          JSON.stringify(j, null, 2);
      })
      .catch(e => {
        document.getElementById('status').textContent = '配置读取失败';
        document.getElementById('json').textContent = String(e);
      });
  </script>
</body>
</html>
